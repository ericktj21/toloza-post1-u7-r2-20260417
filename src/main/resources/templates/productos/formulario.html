<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' Producto'">Producto</title>
    <style>
        body { font-family: 'Trebuchet MS', sans-serif; margin: 2rem; }
        form { max-width: 520px; display: grid; gap: .6rem; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .actions { display: flex; gap: .6rem; }
    </style>
</head>
<body>
<h1 th:text="${accion} + ' Producto'">Producto</h1>

<form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
    <input type="hidden" th:field="*{id}">

    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" th:field="*{nombre}" required>

    <label for="descripcion">Descripcion</label>
    <textarea id="descripcion" rows="3" th:field="*{descripcion}"></textarea>

    <label for="precio">Precio</label>
    <input id="precio" type="number" min="0" step="0.01" th:field="*{precio}" required>

    <div class="actions">
        <button type="submit" th:text="${accion} + ' Producto'">Guardar</button>
        <a th:href="@{/productos}">Cancelar</a>
    </div>
</form>
</body>
</html>
